# Runs on cron schedule, generates PMTiles from the latest CSV and deploys map.html to the gh-pages branch for GitHub Pages.

name: Update map tiles

on:
  schedule:
    - cron: '30 1,6,13,18 * * *'
  push:
    branches: 
      - main
      - dev
    paths:
      - 'map.html'
      - 'update_tiles.py'
      - 'environment.yml'
      - 'data/watershed_shp/**'
  pull_request:
    branches:
      - dev
      - main
  workflow_dispatch:

jobs:
  update-tiles:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          environment-file: environment.yml
          activate-environment: myenv
          miniforge-version: latest
          auto-activate-base: false

      - name: Unzip shapefile
        run: unzip -o data/watershed_shp/Watershed_pfaf_id.shp.zip -d data/watershed_shp/

      - name: Generate PMTiles
        shell: bash -el {0}
        env:
          MOM_CSV_URL: ${{ vars.MOM_CSV_URL }}
        run: python update_tiles.py

      - name: Prepare deployment
        run: |
          mkdir -p deploy/data/tiles deploy/assets
          cp map.html                      deploy/index.html
          cp assets/bluh-logo-256.png      deploy/assets/bluh-logo-256.png
          cp data/tiles/watersheds.pmtiles deploy/data/tiles/
          cp data/tiles/metadata.json      deploy/data/tiles/
          touch deploy/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: deploy
          clean: true
