# Runs on cron schedule, generates PMTiles from the latest CSV and deploys map.html to the gh-pages branch for GitHub Pages.

name: Update published app

on:
  push:
    branches: 
      - main
    paths:
      - '*.html'
      - 'assets/**'
      - 'css/**'
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-deploy-app:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4

      - name: Prepare deployment
        run: |
          mkdir -p deploy/assets deploy/css
          cp index.html                 deploy/index.html
          cp css/styles.css             deploy/css/styles.css
          cp assets/bluh-logo-256.png   deploy/assets/bluh-logo-256.png
          touch deploy/.nojekyll

      - name: Deploy to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          token: ${{ secrets.DEPLOY_PAT }}
          branch: gh-pages
          folder: deploy
          clean: false
